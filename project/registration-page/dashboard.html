<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Главное меню - Петербургский кодекс">
    <meta name="theme-color" content="#D4A574">
    
    <title>Главы | Петербургский кодекс</title>
    
    <!-- Preconnect to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/toast.css">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/chapter-cards.css">
    <link rel="stylesheet" href="css/floating-dock.css">
</head>
<body class="dashboard-page">
    <!-- Header -->
    <header class="dashboard-header" role="banner">
        <div class="header-container">
            <!-- Logo -->
            <a href="index.html" class="header-logo" aria-label="На главную">
                <h1 class="logo-text">Петербургский кодекс</h1>
            </a>
            
            <!-- Actions -->
            <div class="header-actions">
                <!-- Theme Toggle -->
                <button 
                    id="theme-toggle" 
                    class="header-action-btn" 
                    aria-label="Переключить тему"
                    title="Переключить тему"
                >
                    <svg class="theme-icon theme-icon-light" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"/>
                        <line x1="12" y1="1" x2="12" y2="3"/>
                        <line x1="12" y1="21" x2="12" y2="23"/>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                        <line x1="1" y1="12" x2="3" y2="12"/>
                        <line x1="21" y1="12" x2="23" y2="12"/>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                    </svg>
                    <svg class="theme-icon theme-icon-dark" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                    </svg>
                </button>
                
                <!-- Settings Button -->
                <button 
                    id="settings-btn" 
                    class="header-action-btn" 
                    aria-label="Настройки"
                    title="Настройки"
                >
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M12 1v6m0 6v6m8.66-15.66l-4.24 4.24m-4.24 4.24l-4.24 4.24M23 12h-6m-6 0H1m20.66 8.66l-4.24-4.24m-4.24-4.24l-4.24-4.24"/>
                    </svg>
                </button>
            </div>
        </div>
    </header>
    
    <!-- Main Content -->
    <main class="dashboard-main" role="main">
        <div class="dashboard-container">
            <!-- Page Title -->
            <section class="page-header">
                <h2 class="page-title">Главы путешествия</h2>
                <p class="page-subtitle">Выберите достопримечательность для изучения</p>
            </section>
            
            <!-- Chapters Grid -->
            <section class="chapters-grid" id="chapters-grid" aria-label="Список глав"></section>
        </div>
    </main>
    
    <!-- Floating Dock Navigation -->
    <nav class="floating-dock" role="navigation" aria-label="Главная навигация">
        <div class="dock-container">
            <button class="dock-item active" data-page="chapters" aria-current="page">
                <svg class="dock-icon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M18 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 4h5v8l-2.5-1.5L6 12V4z"/>
                </svg>
                <span class="dock-label">Главы</span>
            </button>
            
            <button class="dock-item" data-page="map">
                <svg class="dock-icon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M20.5 3l-.16.03L15 5.1 9 3 3.36 4.9c-.21.07-.36.25-.36.48V20.5c0 .28.22.5.5.5l.16-.03L9 18.9l6 2.1 5.64-1.9c.21-.07.36-.25.36-.48V3.5c0-.28-.22-.5-.5-.5zM15 19l-6-2.11V5l6 2.11V19z"/>
                </svg>
                <span class="dock-label">Карта</span>
            </button>
            
            <button class="dock-item" data-page="feed">
                <svg class="dock-icon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/>
                </svg>
                <span class="dock-label">Лента</span>
            </button>
            
            <button class="dock-item" data-page="profile">
                <svg class="dock-icon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/>
                </svg>
                <span class="dock-label">Профиль</span>
            </button>
        </div>
    </nav>
    
    <!-- Toast Notification Container -->
    <div id="toast-container" class="toast-container" role="alert" aria-live="polite" aria-atomic="true"></div>
    
    <!-- Scripts -->
    <script type="module" src="js/dashboard.js"></script>
</body>
</html>
